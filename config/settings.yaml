agent:
  enable_reflection: true
  max_iterations: 3
  reflection_timeout: 30
embedding:
  api_key: ''  # 空字符串会 fallback 到 DASHSCOPE_API_KEY 环境变量
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  dimensions: 1024
  model: text-embedding-v3
  provider: qwen
evaluation:
  enabled: true
  provider: ragas
  metrics:
    - faithfulness
    - context_precision
    - answer_relevancy
ingestion:
  batch_size: 10
  chunk_overlap: 50
  chunk_refiner:
    use_llm: true
  chunk_size: 500
  min_chunk_size: 200
  concurrency:
    embedding_batch: 1
    image_caption: 3
    llm_transform: 5
  formula_extraction:
    device: cpu
    enabled: true
    language: en
  metadata_enricher:
    use_llm: true
  splitter: smart
llm:
  max_tokens: 8192
  model: qwen3-32b
  provider: qwen
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: ''  # 空字符串会 fallback 到 DASHSCOPE_API_KEY 环境变量
  temperature: 0.0
  # azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  # api_version: "2024-02-15-preview"
observability:
  log_level: INFO
  structured_logging: true
  trace_enabled: true
  trace_file: ./logs/traces.jsonl
rerank:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  provider: cross_encoder
  top_k: 5
retrieval:
  dense_top_k: 20
  fusion_top_k: 10
  rrf_k: 60
  sparse_top_k: 20
vector_store:
  collection_name: default
  persist_directory: ./data/db/chroma
  provider: chroma
vision_llm:
  api_key: ''  # 空字符串会 fallback 到 DASHSCOPE_API_KEY 环境变量
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  enabled: true
  max_image_size: 2048
  model: qwen-omni-turbo
  provider: qwen
